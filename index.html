<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeTunes</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <h1 id="header-title">VibeFlix</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search for movies...">
            <button id="search-btn" type="button">Search</button>
        </div>
    </header>

    <main class="movie-grid">
        <!-- Sample Movie Cards -->
        <div class="movie-card" id="movie-1">
            <img src="https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=2070&auto=format&fit=crop" alt="Inception" class="movie-poster">
            <div class="movie-info">
                <div class="movie-title">Inception</div>
                <div class="movie-rating">⭐ 8.8</div>
            </div>
        </div>

        <div class="movie-card" id="movie-2">
            <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?q=80&w=1925&auto=format&fit=crop" alt="Interstellar" class="movie-poster">
            <div class="movie-info">
                <div class="movie-title">Interstellar</div>
                <div class="movie-rating">⭐ 8.7</div>
            </div>
        </div>

        <div class="movie-card" id="movie-3">
            <img src="https://images.unsplash.com/photo-1542204172-3c3f885f470a?q=80&w=1932&auto=format&fit=crop" alt="The Dark Knight" class="movie-poster">
            <div class="movie-info">
                <div class="movie-title">The Dark Knight</div>
                <div class="movie-rating">⭐ 9.0</div>
            </div>
        </div>

        <div class="movie-card" id="movie-4">
            <img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?q=80&w=2070&auto=format&fit=crop" alt="Dune" class="movie-poster">
            <div class="movie-info">
                <div class="movie-title">Dune: Part Two</div>
                <div class="movie-rating">⭐ 8.9</div>
            </div>
        </div>

        <div class="movie-card" id="movie-5">
            <img src="https://images.unsplash.com/photo-1509248961158-e54f6934749c?q=80&w=2037&auto=format&fit=crop" alt="Joker" class="movie-poster">
            <div class="movie-info">
                <div class="movie-title">Joker</div>
                <div class="movie-rating">⭐ 8.4</div>
            </div>
        </div>

        <div class="movie-card" id="movie-6">
            <img src="https://images.unsplash.com/photo-1485846234645-a62644f84728?q=80&w=2059&auto=format&fit=crop" alt="Cinema" class="movie-poster">
            <div class="movie-info">
                <div class="movie-title">Classic Cinema</div>
                <div class="movie-rating">⭐ 8.2</div>
            </div>
        </div>
    </main>

  <script src="./index.js"></script>
</body>
</html>
